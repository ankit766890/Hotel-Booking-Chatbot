<!DOCTYPE html>
<html>

<head>
    <title>Navigation Bar</title>
    <style>
        html {

            scroll-behavior: smooth;
        }

        section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .nav-container {
            position: fixed;
            width: 100%;
            height: 60px;
            background-color: aqua;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .nav-left a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            padding: 8px 16px;
            background-color: lightslategray;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-right a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            margin-right: 30px;
            padding: 8px 16px;
            background-color: #333;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-right a:hover {
            background-color: black;
        }

        #dashboard {
            background-color: antiquewhite;
        }

        #home {
            background-color: aliceblue;
        }

        .chat-window {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);

            display: flex;

            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #333;
            color: white;
            padding: 10px;
            text-align: center;
        }

        .chat-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .chat-footer {
            display: flex;
            border-top: 1px solid #ccc;
        }

        .chat-footer input {
            flex: 1;
            border: none;
            padding: 10px;
        }

        .chat-footer button {
            background: #333;
            color: white;
            border: none;
            padding: 10px;
        }
    </style>

</head>

<body>

    <script>
        async function sendMessage() {
            
            const input = document.getElementById('chat-input'); 
            const chatBody = document.getElementById('chat-body');
            const message = input.value.trim();

            if (message === "") return;

            const userDiv = document.createElement('p');
            userDiv.innerHTML = `<b>You:</b> ${message}`;
            chatBody.appendChild(userDiv);

            input.value = "";

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();

                const botDiv = document.createElement('p');
                botDiv.innerHTML = `<b>${data.response}</b>`;
                chatBody.appendChild(botDiv);

                chatBody.scrollTop = chatBody.scrollHeight;

            } catch (error) {
                console.error("Error:", error);
                const errorDiv = document.createElement('p');
                errorDiv.style.color = "red";
                errorDiv.innerHTML = "<i>Error: Could not connect to server.</i>";
                chatBody.appendChild(errorDiv);
            }
        }
    </script>

    <nav class="nav-container">
        <div class="nav-left">
            <a href="#home">HOME</a>
            <a href="#dashboard">DASHBOARD</a>
            <a href="#about">ABOUT</a>
            <a href="#contact">CONTACT US</a>
        </div>
        <div class="nav-right">
            <a href="#">Login / Sign Up</a>
        </div>
    </nav>

    <section id="home">
        <h1>Home Section</h1>
    </section>
    <section id="dashboard">
        <h1>Dashboard Area</h1>
    </section>
    <section id="about">
        <h1>About Section</h1>
    </section>

    <section id="contact">
        <h1>Contact</h1>
    </section>
    <div class="chat-window">
        <div class="chat-header">Chatbot</div>

        <div class="chat-body" id="chat-body">
            <p><b>Bot:</b> Hi! How can I help you?</p>
        </div>

        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Type a message..." 
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</body>

</html>
